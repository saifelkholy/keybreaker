services:
  # Backend Service
  - type: web
    name: keybreaker-api
    runtime: node
    buildCommand: npm install && cd ../client && npm install && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TIDB_HOST
        sync: false
      - key: TIDB_USER
        sync: false
      - key: TIDB_PASSWORD
        sync: false
      - key: TIDB_DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false

  # Frontend Static Site
  - type: static
    name: keybreaker-frontend
    runtime: static
    buildCommand: npm install && npm run build
    publishPath: client/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://keybreaker-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
